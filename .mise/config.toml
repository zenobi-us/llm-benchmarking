[tools]
"npm:impeccable" = "latest"
"npm:serve" = "latest"
"pipx:harbor" = "0.18.0"
uv = "0.11.21"

[tasks.dev]
description = "Serve the site at its production GitHub Pages path"
run = '''
root="${XDG_RUNTIME_DIR:-/tmp}/llm-benchmarking-dev-${UID:-$(id -u)}"
install -d -m 700 "$root"
ln -sfn "$MISE_PROJECT_ROOT" "$root/llm-benchmarking"
echo "Open http://localhost:3000/llm-benchmarking/"
serve --symlinks --no-port-switching --listen 3000 "$root"
'''
